<section class="w-full bg-white">
  <div class="mx-auto max-w-7xl px-4 py-10">
    <div
      class="relative overflow-hidden rounded-sm min-h-[260px] sm:min-h-[340px] lg:min-h-[420px]
             flex items-center justify-center"
      [style.backgroundImage]="'url(' + bgImage + ')'"
      style="background-size: cover; background-position: center;"
    >
      <!-- dark overlay -->
      <div class="absolute inset-0 bg-black/35"></div>

      <!-- Content -->
      <div class="relative z-10 text-center px-6 max-w-3xl text-white">
        <h2 class="text-4xl sm:text-6xl font-semibold tracking-wide">
          {{ title }}
        </h2>

        <p class="mt-2 text-xl sm:text-2xl font-medium" style="font-family: Georgia, 'Times New Roman', serif;">
          {{ subtitle }}
        </p>

        <p class="mt-3 text-sm sm:text-base text-white/90">
          {{ description }}
        </p>

        <div class="mt-7 flex flex-col sm:flex-row gap-3 justify-center">
          <a
            [href]="leftBtn.href || '#'"
            class="px-8 py-3 rounded-full bg-white/80 hover:bg-white text-gray-900 text-sm font-semibold shadow"
          >
            {{ leftBtn.label }}
          </a>

          <a
            [href]="rightBtn.href || '#'"
            class="px-8 py-3 rounded-full bg-white/80 hover:bg-white text-gray-900 text-sm font-semibold shadow"
          >
            {{ rightBtn.label }}
          </a>
        </div>
      </div>
    </div>
  </div>
</section>
