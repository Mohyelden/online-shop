<section class="w-full bg-white">
  <div class="mx-auto max-w-7xl px-4 py-10">
    <div class="flex gap-10 overflow-x-auto pb-2 justify-start md:justify-center">
      <a
        *ngFor="let c of items; let i = index; trackBy: trackByIndex"
        [href]="c.href || '#'"
        class="flex-none w-[140px] text-center group"
      >
        <!-- Circle image -->
        <div class="mx-auto w-[112px] h-[112px] rounded-full overflow-hidden bg-gray-100
                    ring-0 group-hover:ring-2 group-hover:ring-gray-300 transition">
          <img
            [src]="c.src"
            [alt]="c.label"
            class="w-full h-full object-cover"
          />
        </div>

        <!-- Label -->
        <div class="mt-3 text-[13px] font-semibold text-gray-900 tracking-wide">
          {{ c.label }}
        </div>
      </a>
    </div>
  </div>
</section>
