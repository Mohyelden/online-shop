<section class="w-full bg-white">
  <div class="mx-auto max-w-7xl px-6 py-10">

    <!-- Header -->
    <div class="flex items-center justify-between">
      <h1 class="text-xl font-semibold text-gray-900">My Favourites</h1>
    </div>
    <div class="mt-4 border-b border-gray-200"></div>

    <!-- Empty State -->
    <div *ngIf="items.length === 0" class="py-20">
      <div class="flex flex-col items-center text-center">
        <i class="fa-regular fa-heart text-3xl text-gray-600"></i>
        <h2 class="mt-4 text-2xl font-semibold text-gray-900">Your favourites is empty</h2>
        <p class="mt-2 text-sm text-gray-600">
          Be inspired and discover something new in our latest arrivals
        </p>

        <a
          routerLink="/"
          class="mt-8 inline-flex items-center justify-center
                 px-10 py-3 rounded-full bg-black text-white font-semibold
                 hover:bg-gray-900 transition"
        >
          Go Shopping
        </a>
      </div>
    </div>

    <!-- Items State -->
    <div *ngIf="items.length > 0" class="py-10">

      <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-10">
        <div *ngFor="let p of items" class="w-full">
          <!-- Product image -->
          <div class="relative bg-gray-100 overflow-hidden">
            <!-- discount badge -->
            <div
              *ngIf="p.badge"
              class="absolute top-3 left-3 text-xs bg-white/80 px-2 py-1"
            >
              {{ p.badge }}
            </div>

            <!-- tag (Ramadan Pick) -->
            <div
              *ngIf="p.tag"
              class="absolute bottom-3 right-3 text-xs bg-blue-300/80 px-2 py-1"
            >
              {{ p.tag }}
            </div>

            <img [src]="p.image" [alt]="p.title" class="block w-full h-[460px] object-cover" />
          </div>

          <!-- Title -->
          <div class="mt-4 text-sm text-gray-900">
            {{ p.title }}
          </div>

          <!-- Price -->
          <div class="mt-4 flex items-center gap-2">
            <div class="text-red-600 font-semibold">{{ egp(p.price) }}</div>
            <div *ngIf="p.oldPrice" class="text-gray-500 line-through text-sm">
              {{ egp(p.oldPrice) }}
            </div>
          </div>

          <!-- Actions -->
          <button
            (click)="moveToBag(p.id)"
            class="mt-6 w-full py-3 rounded-full bg-gray-900 text-white font-semibold
                   hover:bg-black transition"
          >
            Move to Bag
          </button>

          <button
            (click)="remove(p.id)"
            class="mt-3 w-full text-sm text-gray-700 hover:underline"
          >
            Remove
          </button>
        </div>
      </div>

      <!-- bottom text like screenshot -->
      <div class="mt-16 text-center text-xs text-gray-500">
        Showing {{ items.length }} of {{ items.length }} items
      </div>

    </div>

  </div>
</section>
